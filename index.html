<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포트래블</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #fff;
    text-align: center;
}

/* 배경 */
.hero {
    height: 100vh;
    background: url('airport.jpg') no-repeat center/cover;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    padding: 20px;
}

/* 메인 문구 */
h1 {
    font-size: 32px;
    margin-bottom: 40px;
}

/* 버튼 */
.btn {
    display: inline-block;
    padding: 18px 30px;
    border-radius: 30px;
    text-decoration: none;
    color: #fff;
    font-size: 18px;
    margin: 10px;

    background: #1e90ff;
}

/* 환전 버튼 */
.btn.secondary {
    background: #d4af37;
    color: #000;
}

/* 모바일 최적화 */
@media (max-width: 768px) {
    h1 {
        font-size: 26px;
    }

    .btn {
        display: block;
        width: 80%;
        margin: 10px auto;
        font-size: 16px;
    }
}
</style>

</head>

<body>

<div class="hero">

    <h1>당신의 여행을 설계합니다</h1>

    <a href="travel.html" class="btn">✈️ 여행 안내</a>
    <a href="excange.html" class="btn secondary">💱 환전 안내</a>

</div>

</body>
</html>
