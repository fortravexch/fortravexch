<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포트래블</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #fff;
    text-align: center;
}

/* 배경 */
.hero {
    min-height: 100vh;
    background: url('airport.jpg') no-repeat center/cover;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    padding: 20px;
}

/* 상단 문구 */
.subtitle {
    font-size: 18px;
    margin-bottom: 10px;
}

.title {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 10px;
}

.desc {
    font-size: 16px;
    margin-bottom: 40px;
    color: #ddd;
}

/* 카드 영역 */
.card-wrap {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
}

/* 카드 */
.card {
    width: 160px;
    padding: 25px 15px;
    border-radius: 15px;

    background: rgba(128,128,128,0.3); /* 반투명 회색 */
    backdrop-filter: blur(6px);

    text-align: center;
}

/* 카드 타이틀 */
.card-title {
    font-size: 18px;
    margin-bottom: 10px;
}

/* 버튼 */
.card a {
    text-decoration: none;
    font-size: 14px;
    color: #fff;
    opacity: 0.9;
}

/* 모바일 */
@media (max-width: 768px) {

    .title {
        font-size: 24px;
    }

    .desc {
        font-size: 14px;
    }

    .card {
        width: 140px;
        padding: 20px 10px;
    }
}
</style>

</head>

<body>

<div class="hero">

    <!-- 상단 문구 -->
    <div class="subtitle">여행의 시작 최고의 선택</div>
    <div class="title">여행과 환전을 한 곳에서!</div>
    <div class="desc">안전하고 편리한 여행 & 환전서비스</div>

    <!-- 카드 -->
    <div class="card-wrap">

        <div class="card">
            <div class="card-title">포트래블</div>
            <a href="travel.html">바로가기 →</a>
        </div>

        <div class="card">
            <div class="card-title">으뜸환전</div>
            <a href="exch.html">바로가기 →</a>
        </div>

    </div>

</div>

</body>
</html>
