<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포트래블</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #fff;
    text-align: center;
}

/* 배경 */
.hero {
    position: relative;
    min-height: 100vh;
    background: url('air.jpg') no-repeat center/cover;

    display: flex;
    flex-direction: column;
    justify-content: flex-start;   /* 🔥 중앙 → 위로 */
    align-items: center;

    padding-top: 12vh;  /* 🔥 이 값으로 위치 조절 (10~18vh 추천) */
    padding-left: 20px;
    padding-right: 20px;
}

/* 🔥 배경 어둡게 (핵심) */
.hero::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.45);
    top: 0;
    left: 0;
}

/* 콘텐츠는 위로 올리기 */
.content {
    position: relative;
    z-index: 1;
}

/* 상단 문구 */
.subtitle {
    font-size: 18px;
    margin-bottom: 10px;

    text-shadow: 0 2px 6px rgba(0,0,0,0.8);
}

.title {
    font-size: 30px;
    font-weight: bold;
    margin-bottom: 10px;

    text-shadow: 0 3px 8px rgba(0,0,0,0.9);
}

.desc {
    font-size: 16px;
    margin-bottom: 40px;
    color: #eee;

    text-shadow: 0 2px 6px rgba(0,0,0,0.8);
}

/* 카드 영역 */
.card-wrap {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
}

/* 카드 */
.card {
    width: 160px;
    padding: 25px 15px;
    border-radius: 15px;

    background: rgba(120,120,120,0.35);
    backdrop-filter: blur(6px);

    text-align: center;
}

/* 카드 타이틀 */
.card-title {
    font-size: 18px;
    margin-bottom: 10px;
}

/* 링크 */
.card a {
    text-decoration: none;
    font-size: 14px;
    color: #fff;
    opacity: 0.9;
}

/* 모바일 */
@media (max-width: 768px) {
    .title {
        font-size: 24px;
    }

    .desc {
        font-size: 14px;
    }

    .card {
    width: 160px;
    padding: 25px 15px;
    border-radius: 15px;

    background: rgba(120,120,120,0.35);
    backdrop-filter: blur(6px);

    text-align: center;
    text-decoration: none;  /* 🔥 링크 밑줄 제거 */
    color: #fff;

    display: block; /* 🔥 전체 클릭 가능 */
}

/* 바로가기 텍스트 */
.card-link {
    font-size: 14px;
    opacity: 0.9;
    }
}
    a, a:link, a:visited, a:hover, a:active {
    color: #fff !important;
    text-decoration: none;
}
</style>

</head>

<body>

<div class="hero">

    <div class="content">

        <!-- 상단 문구 -->
        <div class="subtitle">여행의 시작 최고의 선택</div>
        <div class="title">여행과 환전을 한 곳에서!</div>
        <div class="desc">안전하고 편리한 여행 & 환전서비스</div>

        <!-- 카드 -->
        <div class="card-wrap">

   <a href="travel.html" class="card">
    <div class="card-title">포트래블</div>
    <div class="card-link">바로가기</div>
</a>

<a href="exchange.html" class="card">
    <div class="card-title">으뜸환전</div>
    <div class="card-link">바로가기</div>
</a>

        </div>

    </div>

</div>

</body>
</html>
