<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>포트래블 & 으뜸환전</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;

      /* 안정적인 배경 (이미지 + 그라데이션 같이 사용) */
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                  url('https://picsum.photos/1200/800') no-repeat center center/cover;
    }

    .container {
      min-height: 100vh;
      padding: 80px 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      color: #ddd;
      margin-bottom: 40px;
    }

    .card-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: rgba(255,255,255,0.95);
      color: black;
      width: 260px;
      padding: 25px;
      border-radius: 15px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .icon {
      font-size: 40px;
    }

    .btn {
      margin-top: 15px;
      padding: 10px;
      border-radius: 8px;
      color: white;
      display: inline-block;
    }

    .travel-btn {
      background: #2563eb;
    }

    .exchange-btn {
      background: #16a34a;
    }

    /* 📱 모바일 최적화 */
    @media (max-width: 600px) {
      h1 {
        font-size: 24px;
      }

      .card {
        width: 90%;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <h1>✈️ 여행과 환전을 한 번에</h1>
  <p>포트래블 & 으뜸환전 서비스</p>

  <div class="card-container">

    <!-- 포트래블 -->
    <div class="card" onclick="location.href='travel.html'">
      <div class="icon">✈️</div>
      <h2>포트래블</h2>
      <p>여행 상담 및 예약</p>
      <div class="btn travel-btn">바로가기</div>
    </div>

    <!-- 으뜸환전 -->
    <div class="card" onclick="location.href='exchange.html'">
      <div class="icon">💱</div>
      <h2>으뜸환전</h2>
      <p>실시간 환율 & 환전 서비스</p>
      <div class="btn exchange-btn">바로가기</div>
    </div>

  </div>

</div>

</body>
</html>
