<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>포트래블 & 으뜸환전</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;

      /* 🌍 여행 느낌 색감 */
      background: linear-gradient(135deg, #0f172a, #1e40af);
    }

    .container {
      min-height: 100vh;
      padding: 80px 20px;
    }

    h1 {
      font-size: 34px;
      margin-bottom: 10px;
    }

    p.subtitle {
      color: #cbd5e1;
      margin-bottom: 40px;
    }

    .card-container {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      color: #111;
      width: 200px;
      padding: 20px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 8px 15px rgba(0,0,0,0.3);
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .card h2 {
      margin: 8px 0;
      font-size: 20px;
    }

    .desc {
      font-size: 14px;
      color: #333;
    }

    .btn {
      margin-top: 12px;
      padding: 8px;
      border-radius: 6px;
      color: white;
      font-size: 13px;
      display: inline-block;
    }

    .travel-btn {
      background: #2563eb;
    }

    .exchange-btn {
      background: #16a34a;
    }

    /* 📱 모바일 */
    @media (max-width: 600px) {
      h1 {
        font-size: 24px;
      }

      .card {
        width: 85%;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <h1>✈️ 여행과 환전을 한 번에</h1>
  <p class="subtitle">포트래블 & 으뜸환전 서비스</p>

  <div class="card-container">

    <!-- 포트래블 -->
    <div class="card" onclick="location.href='travel.html'">
      <div class="icon">✈️</div>
      <h2>포트래블</h2>
      <div class="desc">여행 상담 및 예약</div>
      <div class="btn travel-btn">바로가기</div>
    </div>

    <!-- 으뜸환전 -->
    <div class="card" onclick="location.href='exchange.html'">
      <div class="icon">💱</div>
      <h2>으뜸환전</h2>
      <div class="desc">실시간 환율 & 환전 서비스</div>
      <div class="btn exchange-btn">바로가기</div>
    </div>

  </div>

</div>

</body>
</html>
