<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>포트래블 & 으뜸환전</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      background: url('https://images.unsplash.com/photo-1504198266285-165a1a24f7db') no-repeat center center/cover;
    }

    .overlay {
      background: rgba(0,0,0,0.6);
      min-height: 100vh;
      padding: 80px 20px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    p {
      color: #ddd;
      margin-bottom: 50px;
    }

    .card-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: rgba(255,255,255,0.9);
      color: black;
      width: 260px;
      padding: 30px;
      border-radius: 15px;
      cursor: pointer;
      transition: 0.3s;
      backdrop-filter: blur(5px);
    }

    .card:hover {
      transform: scale(1.05);
    }

    .icon {
      font-size: 45px;
    }

    .btn {
      margin-top: 15px;
      padding: 10px;
      border-radius: 8px;
      color: white;
      display: inline-block;
    }

    .travel-btn {
      background: #2563eb;
    }

    .exchange-btn {
      background: #16a34a;
    }
  </style>
</head>

<body>

<div class="overlay">

  <h1>✈️ 여행과 환전을 한 번에</h1>
  <p>포트래블 & 으뜸환전 서비스</p>

  <div class="card-container">

    <div class="card" onclick="location.href='travel.html'">
      <div class="icon">✈️</div>
      <h2>포트래블</h2>
      <p>여행 상담 및 예약</p>
      <div class="btn travel-btn">바로가기</div>
    </div>

    <div class="card" onclick="location.href='exchange.html'">
      <div class="icon">💱</div>
      <h2>으뜸환전</h2>
      <p>실시간 환율 & 환전 서비스</p>
      <div class="btn exchange-btn">바로가기</div>
    </div>

  </div>

</div>

</body>
</html>
