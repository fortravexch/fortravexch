<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<!-- 🔥 이거 없으면 모바일에서 무조건 작게 보임 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>포트래블</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #fff;
    text-align: center;
    background: #000;
}

/* 배경 */
.hero {
    min-height: 100vh;
    background: url('airport.jpg') no-repeat center/cover;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    padding: 20px;
}

/* 어둡게 덮기 */
.overlay {
    background: rgba(0,0,0,0.4);
    padding: 30px 20px;
    border-radius: 20px;
    width: 100%;
    max-width: 420px;
}

/* 로고 */
.logo img {
    width: 70%;
    max-width: 260px;
    margin-bottom: 20px;
}

/* 메인 문구 */
h1 {
    font-size: 26px;
    margin-bottom: 30px;
}

/* 버튼 영역 */
.btn-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* 버튼 */
.btn {
    display: block;
    padding: 16px;
    border-radius: 30px;
    text-decoration: none;
    color: #fff;
    font-size: 16px;

    background: linear-gradient(135deg, #1e90ff, #0066ff);
}

.btn.secondary {
    background: linear-gradient(135deg, #f5d76e, #d4af37);
    color: #000;
}
</style>

</head>

<body>

<div class="hero">

    <div class="overlay">

        <!-- 로고 -->
        <div class="logo">
            <img src="fort.gif" alt="포트래블">
        </div>

        <!-- 문구 -->
        <h1>당신의 여행을 설계합니다</h1>

        <!-- 버튼 -->
        <div class="btn-group">
            <a href="travel.html" class="btn">✈️ 여행 안내</a>
            <a href="exch.html" class="btn secondary">💱 환전 안내</a>
        </div>

    </div>

</div>

</body>
</html>
