<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>으뜸환전</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #fff;
    text-align: center;
    background: url('exbg.jpg') no-repeat center/cover;
}

/* 오버레이 */
.overlay {
    background: rgba(0,0,0,0.6);
    min-height: 100vh;

    display: flex;
    flex-direction: column;
    align-items: center;

    padding: 20px;
}

/* 상단 */
.top-bar {
    width: 100%;
    max-width: 500px;
    display: flex;
    justify-content: flex-end;
}

.back {
    font-size: 13px;
    color: #fff;
    text-decoration: none;
}

/* 텍스트 */
.text-group {
    margin-top: 8vh;
    margin-bottom: 25px;
}

.main-text {
    font-size: 20px;
    margin-bottom: 8px;
}

.title {
    font-size: 36px;
    font-weight: bold;
    margin-bottom: 8px;

    background: linear-gradient(135deg, #f5d76e, #d4af37, #8b6f1e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.sub-text {
    font-size: 16px;
    color: #eee;
}

/* 메뉴 */
.menu-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 400px;
    margin-bottom: 25px;
}

.menu-item {
    background: rgba(255,255,255,0.15);
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
}

/* 버튼 */
.btn {
    display: inline-block;
    margin: 8px;
    padding: 12px 20px;
    border-radius: 25px;
    text-decoration: none;
    color: #fff;
    background: linear-gradient(135deg, #1e90ff, #0066ff);
}

.btn.secondary {
    background: linear-gradient(135deg, #777, #444);
}

/* 연락처 */
.contact {
    margin-top: 20px;
    font-size: 14px;
    color: #eee;
    line-height: 1.6;
}

.map-btn {
    display: inline-block;
    margin-top: 10px;
    font-size: 13px;
    color: #ddd;
    text-decoration: underline;
}

/* =========================
   🔥 환율 섹션 추가
========================= */

.exchange-section {
    width: 100%;
    max-width: 420px;
    margin: 30px 0;
    padding: 20px 10px;
}

.rate-info {
    display: flex;
    justify-content: center;
    gap: 15px;
    font-size: 13px;
    color: #ddd;
    margin-bottom: 15px;
}

.currency-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.currency {
    background: rgba(255,255,255,0.12);
    padding: 10px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 14px;
}

/* 🔥 RHB 강조 (핵심 포인트) */
.rhb-box {
    margin-top: 25px;
    padding: 16px 0;
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 6px;
    color: #d4af37;

    text-align: center;

    border-top: 1px solid rgba(212,175,55,0.3);
    border-bottom: 1px solid rgba(212,175,55,0.3);

    background: linear-gradient(90deg, transparent, rgba(255,215,0,0.08), transparent);
}

</style>
</head>

<body>

<div class="overlay">

    <!-- 상단 -->
    <div class="top-bar">
        <a href="index.html" class="back">메인으로</a>
    </div>

    <!-- 텍스트 -->
    <div class="text-group">
        <div class="main-text">최고의 환율</div>
        <div class="title">으뜸환전</div>
        <div class="sub-text">빠르고 편안한 환전</div>
    </div>

    <!-- 메뉴 -->
    <div class="menu-grid">
        <div class="menu-item">우대환율</div>
        <div class="menu-item">당일환율</div>
        <div class="menu-item">다국통화</div>
    </div>

    <!-- 🔥 환율 섹션 -->
    <div class="exchange-section">

        <div class="rate-info">
            <div>우대환율</div>
            <div>당일환율</div>
            <div>실시간환율</div>
        </div>

        <div class="currency-grid">
            <div class="currency">USD</div>
            <div class="currency">JPY</div>
            <div class="currency">CNY</div>
            <div class="currency">EUR</div>
            <div class="currency">HKD</div>
            <div class="currency">TWD</div>
        </div>

        <div class="rhb-box">RHB</div>

    </div>

    <!-- 버튼 -->
    <div>
        <a href="tel:0222780033" class="btn">📞 전화 상담</a>
        <a href="sms:01058613777" class="btn secondary">📩 문자 상담</a>
    </div>

    <!-- 연락처 -->
    <div class="contact">
        📞 02-2278-0033<br>
        📩 010-5861-3777<br>
        📍 서울시 중구 을지로42길 11<br>

        <a href="https://maps.google.com/?q=서울시+중구+을지로42길+11" target="_blank" class="map-btn">
            👉 지도에서 보기
        </a>
    </div>

</div>

</body>
</html>
