<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>으뜸환전</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #fff;
    text-align: center;
    background: url('exbg.jpg') no-repeat center/cover;
}

/* 오버레이 */
.overlay {
    background: rgba(0,0,0,0.6);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

/* 상단 */
.top-bar {
    width: 100%;
    max-width: 500px;
    display: flex;
    justify-content: flex-end;
}

.back {
    font-size: 13px;
    color: #fff;
    text-decoration: none;
}

/* 텍스트 */
.text-group {
    margin-top: 8vh;
    margin-bottom: 25px;
}

.main-text {
    font-size: 20px;
    margin-bottom: 8px;
}

.title {
    font-size: 36px;
    font-weight: bold;
    margin-bottom: 8px;

    background: linear-gradient(135deg, #f5d76e, #d4af37, #8b6f1e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.sub-text {
    font-size: 16px;
    color: #eee;
}

/* 메뉴 */
.menu-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 400px;
    margin-bottom: 25px;
}

.menu-item {
    background: rgba(255,255,255,0.15);
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
}

/* 버튼 */
.btn {
    display: inline-block;
    margin: 8px;
    padding: 12px 20px;
    border-radius: 25px;
    text-decoration: none;
    color: #fff;
    background: linear-gradient(135deg, #1e90ff, #0066ff);
}

.btn.secondary {
    background: linear-gradient(135deg, #777, #444);
}

/* 연락처 */
.contact {
    margin-top: 20px;
    font-size: 14px;
    color: #eee;
    line-height: 1.6;
}

.map-btn {
    display: inline-block;
    margin-top: 10px;
    font-size: 13px;
    color: #ddd;
    text-decoration: underline;
}

/* =========================
   🔥 통합 환율 카드
========================= */

.exchange-box {
    width: 100%;
    max-width: 420px;
    margin: 30px 0;
    padding: 22px 15px;

    background: rgba(255,255,255,0.08);
    border-radius: 18px;
    backdrop-filter: blur(6px);
}

/* 타이틀 */
.rate-title {
    font-size: 16px;
    margin-bottom: 18px;
    color: #eee;
}

/* 1줄: 환율 타입 */
.rate-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

.rate-item {
    flex: 1;
    margin: 0 5px;
    padding: 8px 0;

    font-size: 13px;
    color: #ddd;

    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
}

/* 2줄: 통화 */
.currency-row {
    display: flex;
    justify-content: space-around;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 10px;
}

/* 3줄: RHB (핵심) */
.rhb-row {
    margin-top: 10px;
    display: flex;
    justify-content: center;
}

.rhb {
    width: 100%;
    max-width: 120px;

    padding: 10px 0;
    border-radius: 10px;

    border: 1px solid rgba(255,255,255,0.2);

    font-weight: 800;
    letter-spacing: 4px;

    color: #d4af37; /* 금색 */
    background: rgba(212,175,55,0.08);
}

</style>
</head>

<body>

<div class="overlay">

    <!-- 상단 -->
    <div class="top-bar">
        <a href="index.html" class="back">메인으로</a>
    </div>

    <!-- 텍스트 -->
    <div class="text-group">
        <div class="main-text">최고의 환율</div>
        <div class="title">으뜸환전</div>
        <div class="sub-text">빠르고 편안한 환전</div>
    </div>

    <!-- 메뉴 -->
    <div class="menu-grid">
        <div class="menu-item">우대환율</div>
        <div class="menu-item">당일환율</div>
        <div class="menu-item">다국통화</div>
    </div>

    <!-- 🔥 환율 통합 블록 -->
    <div class="exchange-box">

        <div class="rate-title">환율 안내</div>

        <!-- 1줄 -->
        <div class="rate-row">
            <div class="rate-item">우대환율</div>
            <div class="rate-item">예약환율</div>
            <div class="rate-item">실시간환율</div>
        </div>

        <!-- 2줄 -->
        <div class="currency-row">
            <div>USD</div>
            <div>JPY</div>
            <div>CNY</div>
        </div>

        <div class="currency-row">
            <div>EUR</div>
            <div>HKD</div>
            <div>TWD</div>
        </div>

        <!-- 3줄 RHB -->
        <div class="rhb-row">
            <div class="rhb">RHB</div>
        </div>

    </div>

    <!-- 버튼 -->
    <div>
        <a href="tel:0222780033" class="btn">📞 전화 상담</a>
        <a href="sms:01058613777" class="btn secondary">📩 문자 상담</a>
    </div>

    <!-- 연락처 -->
    <div class="contact">
        📞 02-2278-0033<br>
        📩 010-5861-3777<br>
        📍 서울시 중구 을지로42길 11<br>

        <a href="https://maps.google.com/?q=서울시+중구+을지로42길+11" target="_blank" class="map-btn">
            👉 지도에서 보기
        </a>
    </div>

</div>

</body>
</html>
