<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>으뜸환전</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #fff;
    text-align: center;
    background: url('exbg.jpg') no-repeat center/cover;
}

/* 전체 오버레이 */
.overlay {
    background: rgba(0,0,0,0.6);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
}

/* 상단 */
.top-bar {
    width: 100%;
    max-width: 500px;
    display: flex;
    justify-content: flex-end;
}

.back {
    font-size: 13px;
    color: #fff;
    text-decoration: none;
}

/* 타이틀 */
.text-group {
    margin-top: 8vh;
    margin-bottom: 25px;
}

.main-text {
    font-size: 20px;
    margin-bottom: 8px;
}

.title {
    font-size: 36px;
    font-weight: bold;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #f5d76e, #d4af37, #8b6f1e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.sub-text {
    font-size: 16px;
    color: #eee;
}

/* 메뉴 */
.menu-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 400px;
    margin-bottom: 25px;
}

.menu-item {
    background: rgba(255,255,255,0.15);
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
}

/* 버튼 */
.btn {
    display: inline-block;
    margin: 8px;
    padding: 12px 20px;
    border-radius: 25px;
    text-decoration: none;
    color: #fff;
    background: linear-gradient(135deg, #1e90ff, #0066ff);
}

.btn.secondary {
    background: linear-gradient(135deg, #777, #444);
}

/* 연락처 */
.contact {
    margin-top: 20px;
    font-size: 14px;
    color: #eee;
    line-height: 1.6;
}

.map-btn {
    display: inline-block;
    margin-top: 10px;
    font-size: 13px;
    color: #ddd;
    text-decoration: underline;
}

/* =========================
   🔥 환율 3x3 + RHB 구조
========================= */

.exchange-box {
    width: 100%;
    max-width: 420px;
    margin: 30px 0;
}

/* 타이틀 */
.rate-title {
    font-size: 16px;
    margin-bottom: 18px;
    color: #eee;
}

/* 공통 네모칸 */
.box {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;

    padding: 12px 0;
    font-size: 13px;
    color: #fff;
}

/* 3칸 그리드 */
.grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 10px;
}

/* RHB 영역 (중앙 강조) */
.rhb-wrap {
    display: flex;
    justify-content: center;
    margin-top: 12px;
}

/* 🔥 금색 강조 */
.rhb {
    width: 100%;
    max-width: 120px;

    background: rgba(212,175,55,0.08);
    border: 1px solid #d4af37;
    border-radius: 10px;

    padding: 12px 0;

    font-weight: 900;
    letter-spacing: 4px;
    color: #d4af37;
}

</style>
</head>

<body>

<div class="overlay">

    <!-- 상단 -->
    <div class="top-bar">
        <a href="index.html" class="back">메인으로</a>
    </div>

    <!-- 타이틀 -->
    <div class="text-group">
        <div class="main-text">동대문 최고의 환율</div>
        <div class="title">으뜸환전</div>
        <div class="sub-text">빠르고 편안한 환전</div>
    </div>

        <!-- 🔥 환율 3x3 -->
    <div class="exchange-box">

            <!-- 1줄 -->
        <div class="grid-3">
            <div class="box">우대환율</div>
            <div class="box">예약환율</div>
            <div class="box">실시간환율</div>
        </div>

        <!-- 2줄 -->
        <div class="grid-3">
            <div class="box">USD</div>
            <div class="box">JPY</div>
            <div class="box">CNY</div>
        </div>

        <!-- 3줄 -->
        <div class="grid-3">
            <div class="box">EUR</div>
            <div class="box">HKD</div>
            <div class="box">TWD</div>
        </div>

        <!-- 🔥 RHB (중앙 강조) -->
        <div class="rhb-wrap">
            <div class="rhb">RUB</div>
        </div>

    </div>

    <!-- 버튼 -->
    <div>
        <a href="tel:0222780033" class="btn">📞 전화 상담</a>
        <a href="sms:01058613777" class="btn secondary">📩 문자 상담</a>
    </div>

    <!-- 연락처 -->
    <div class="contact">
        📞 02-2278-0033<br>
        📩 010-5861-3777<br>
        📍 서울시 중구 을지로42길 11<br>

<a href="https://map.naver.com/v5/search/서울시%20중구%20을지로42길%2011" target="_blank" class="bottom-btn">
            약도보기
        </a>
    </div>

</div>

</body>
</html>
