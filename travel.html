<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>여행 서비스</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f5f5f5;
    }

    .hero {
      height: 100vh;
      background-image: url('travel.jpg'); /* 배경이미지 */
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .overlay {
      background: rgba(0,0,0,0.5);
      padding: 40px;
      color: white;
      border-radius: 10px;
    }

    .btn {
      margin-top: 20px;
      padding: 15px 25px;
      font-size: 18px;
      background-color: #00aaff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .section {
      padding: 50px 20px;
      background: white;
    }

    iframe {
      width: 90%;
      height: 300px;
      border: none;
    }
  </style>
</head>

<body>

  <!-- 메인 화면 -->
  <div class="hero">
    <div class="overlay">
      <h1>여행 상담</h1>
      <p>전세계 여행 상품 안내</p>
      <a href="#contact" class="btn">상담 문의</a>
    </div>
  </div>

  <!-- 연락 -->
  <div id="contact" class="section">
    <h2>전화 상담</h2>
    <p>📞 02-2278-0034</p>
  </div>

  <!-- 지도 -->
  <div class="section">
    <h2>오시는 길</h2>
    <iframe 
      src="https://maps.google.com/maps?q=서울시 중구 을지로42길 11&t=&z=13&ie=UTF8&iwloc=&output=embed">
    </iframe>
  </div>

</body>
</html>
