<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포트래블 여행</title>

<style>
body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    color: #fff;
    text-align: center;
    
    /* 배경 이미지 */
    background: url('fortravelbg.jpg') no-repeat center center/cover;
}

/* 어둡게 덮기 */
.overlay {
    background: rgba(0,0,0,0.65);
    min-height: 100vh;
    padding: 40px 20px;
}

/* 로고 */
.logo img {
    width: 160px;
    margin-bottom: 30px;
}

/* 제목 */
.section-title {
    font-size: 20px;
    margin: 30px 0 15px;
    font-weight: bold;
}

/* 3열 그리드 */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    font-size: 14px;
    color: #ddd;
}

/* 항목 스타일 */
.grid div {
    background: rgba(255,255,255,0.08);
    padding: 10px;
    border-radius: 8px;
}

/* 버튼 */
.btn {
    display: inline-block;
    margin: 10px;
    padding: 12px 20px;
    border-radius: 8px;
    text-decoration: none;
    color: #fff;
    background: #1e90ff;
}

.btn.secondary {
    background: #555;
}

/* 연락처 */
.contact {
    margin-top: 40px;
    font-size: 14px;
    color: #ccc;
}
</style>

</head>

<body>

<div class="overlay">

    <!-- 로고 -->
    <div class="logo">
        <img src="fort.gif" alt="포트래블 로고">
    </div>

    <!-- 업무내역 -->
    <div class="section-title">업무내역</div>
    <div class="grid">
        <div>해외연수</div>
        <div>해외컨퍼런스</div>
        <div>해외워크샵</div>
        <div>전시회참관</div>
        <div>수학여행</div>
        <div>시장조사</div>
        <div>학교/기업방문</div>
        <div>단체패키지</div>
        <div>학술세미나</div>
        <div>가족여행</div>
    </div>

    <!-- 서비스 -->
    <div class="section-title">서비스</div>
    <div class="grid">
        <div>항공권예약</div>
        <div>비자/보험</div>
        <div>단체출장</div>
        <div>연수</div>
        <div>중앙아시아</div>
    </div>

    <!-- 버튼 -->
    <div style="margin-top:30px;">
        <a href="tel:0222780034" class="btn">전화 상담</a>
        <a href="sms:01058613777" class="btn secondary">문자 상담</a>
    </div>

    <!-- 연락처 -->
    <div class="contact">
        📞 02-2278-0034<br>
        📩 010-5861-3777<br>
        📍 서울시 중구 을지로42길 11
    </div>

</div>

</body>
</html>
